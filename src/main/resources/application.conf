app {
  routes {
    # If ask takes more time than this to complete the request is failed
    ask-timeout = 10s
  }
}

akka {
  loglevel = "DEBUG"
  loglevel = ${?LOG_LEVEL}
  http.server.enable-http2 = on
  loggers = ["akka.event.slf4j.Slf4jLogger"]
}

keycloak {
