}

akka.grpc.client {
    "register.RegisterEegService" {
      host = 127.0.0.1
      host = ${?REGISTER_SERVICE_HOST_EEG}
      port = 9092
      use-tls = false
    }
    "register.RegisterPontonService" {
      host = 127.0.0.1
      host = ${?REGISTER_SERVICE_HOST_PONTON}
      port = 9093
      use-tls = false
    }
}

