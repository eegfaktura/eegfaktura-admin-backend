  realm = ${?KEYCLOAK_ADMIN_REALM}
  clientId = "admin-cli"
  clientId = ${?KEYCLOAK_ADMIN_AUDIENCE}
  secret = "P85u55EUB7w6JFjQBxsHDCbdy8TXibDI"
  secret = ${?KEYCLOAK_ADMIN_SECRET}
